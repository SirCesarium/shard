name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-gnu
          - i686-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Package Artifacts
        run: |
          mkdir -p artifacts
          # Copy SDK Library
          if [ -f "target/${{ matrix.target }}/release/libshard_sdk.so" ]; then
            cp "target/${{ matrix.target }}/release/libshard_sdk.so" "artifacts/libshard_sdk_${{ matrix.target }}.so"
          fi
          # Copy CLI Binary
          if [ -f "target/${{ matrix.target }}/release/shard" ]; then
            cp "target/${{ matrix.target }}/release/shard" "artifacts/shard_${{ matrix.target }}"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: artifacts/*

  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # Copy SDK DLL
          cp "target/${{ matrix.target }}/release/shard_sdk.dll" "artifacts/shard_sdk_${{ matrix.target }}.dll"
          # Copy CLI EXE
          cp "target/${{ matrix.target }}/release/shard.exe" "artifacts/shard_${{ matrix.target }}.exe"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: artifacts/*

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package Artifacts
        run: |
          mkdir -p artifacts
          # Copy SDK Dylib
          cp "target/${{ matrix.target }}/release/libshard_sdk.dylib" "artifacts/libshard_sdk_${{ matrix.target }}.dylib"
          # Copy CLI Binary
          cp "target/${{ matrix.target }}/release/shard" "artifacts/shard_${{ matrix.target }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: artifacts/*

  release:
    name: Create Release & Publish
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -R all-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/*
          generate_release_notes: true

      - name: Publish to Crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # Publish core first
          cargo publish -p shard-core
          # Wait a few seconds for crates.io to index (optional but safer)
          sleep 10
          # Publish sdk
          cargo publish -p shard-sdk
          sleep 10
          # Publish cli
          cargo publish -p shard-cli
